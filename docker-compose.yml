services:
  mysql:
    image: mysql:8.0
    container_name: invoice-followup-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: invoice_followup
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  postgres:
    image: postgres:16
    container_name: invoice-followup-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: openworkflow
      POSTGRES_USER: owuser
      POSTGRES_PASSWORD: owpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  mysql_data:
  postgres_data:
