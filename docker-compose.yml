services:
  postgres:
    image: postgres:16
    container_name: invoice-followup-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: openworkflow
      POSTGRES_USER: owuser
      POSTGRES_PASSWORD: owpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql

volumes:
  postgres_data:
